# =============================================================================
# General
# =============================================================================

unbind C-a
set -g prefix C-b
bind C-b send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape-time for neovim
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Focus events for neovim autoread
set -g focus-events on

# =============================================================================
# Terminal colours
# =============================================================================

set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# =============================================================================
# Key bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes using | and - (and open in current directory)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch between last two windows
bind a last-window

# Sessionizer — fuzzy find project dir and open/switch to its tmux session
bind f display-popup -E "$HOME/.local/bin/tmux-sessionizer"

# Cheatsheet popups (q or Esc to close)
bind C-t display-popup -E "bat --plain $HOME/dotfiles/cheatsheets/tmux.cheat | less -R"
bind C-n display-popup -E "bat --plain $HOME/dotfiles/cheatsheets/nvim.cheat | less -R"
bind C-e display-popup -E "bat --plain $HOME/dotfiles/cheatsheets/shell.cheat | less -R"

# =============================================================================
# Copy mode (vim keybindings)
# =============================================================================

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# Status bar (catppuccin)
# =============================================================================

set -g @catppuccin_flavour 'macchiato'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_date_time_text "%H:%M"

# =============================================================================
# Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Which-key menu — triggered by prefix + ?
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @tmux-which-key-xdg-enable 1

# Session persistence — save with prefix + C-s, restore with prefix + C-r
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 minutes
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
